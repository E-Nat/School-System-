name: PHP Composer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Detect Composer project
      id: composer-detect
      run: |
        if [ -f composer.json ]; then
          echo "has_composer=true" >> $GITHUB_OUTPUT
        else
          echo "has_composer=false" >> $GITHUB_OUTPUT
        fi
        if [ -f composer.lock ]; then
          echo "has_lock=true" >> $GITHUB_OUTPUT
        else
          echo "has_lock=false" >> $GITHUB_OUTPUT
        fi

    - name: Validate composer.json and composer.lock
      if: steps.composer-detect.outputs.has_composer == 'true'
      run: composer validate --strict

    - name: Cache Composer packages
      if: steps.composer-detect.outputs.has_composer == 'true' && steps.composer-detect.outputs.has_lock == 'true'
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      if: steps.composer-detect.outputs.has_composer == 'true'
      run: composer install --prefer-dist --no-progress

    # Add a test script to composer.json, for instance: "test": "vendor/bin/phpunit"
    # Docs: https://getcomposer.org/doc/articles/scripts.md

    # - name: Run test suite
    #   run: composer run-script test
