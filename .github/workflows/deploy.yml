name: PHP CI/CD with Telegram Alert

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Validate PHP syntax
        run: |
          find . -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Send Telegram CI/CD alert
        if: always()
        run: |
          if [ "${{ job.status }}" = "failure" ]; then
            STATUS="FAILURE"
            EMOJI="❌"
          else
            STATUS="SUCCESS"
            EMOJI="✅"
          fi
          TEXT="$EMOJI CI/CD $STATUS for $GITHUB_REPOSITORY\nBranch: $GITHUB_REF\nRun: $GITHUB_RUN_ID\nURL: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          curl -s -X POST https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.CHAT_ID }} \
            -d text="$TEXT"