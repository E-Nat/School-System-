name : Build & Deploy Spring app
on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-deploy:
    name: Build and Deploy Spring boot for beginner
    runs-on: ubuntu-latest
    steps:
          name: check code
          uses: actions/checkout@v2
       -  name: Set up JDK 17
          uses: actions/setup-java@v2
          with:
            java-version: '17'

         - name: Build Application
            run: |
              mvn clean install
             mvn -B package --flile pom.xml 
           